name: Feature request
description: Suggest an improvement for browser-goblin
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or workflow
      description: What coding/browser workflow should this improve?
      placeholder: "I want Pi to..."
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should browser-goblin do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: notes
    attributes:
      label: Additional context
